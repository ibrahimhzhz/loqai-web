kind = "web"
previewPath = "/"
title = "LoqAI Website"
version = "1.0.0"
id = "artifacts/loqai-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20458
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/loqai-website run dev"

[services.env]
PORT = "20458"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/loqai-website", "run", "build"]
publicDir = "artifacts/loqai-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
